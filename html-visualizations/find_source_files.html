<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Find Source Files</title>
<link rel="stylesheet" href="_shared/styles.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<header>
  <h1>Find source files</h1>
  <p class="sub">Drop a FindSourceFiles CSV to see a horizontal bar of LST node-types across the portfolio.</p>
  <p class="sub"><a href="index.html">&larr; Back to index</a></p>
</header>

<div class="card">
  <div class="file-drop" id="drop"><input type="file" id="file" accept=".csv" /><div id="drop-text"><strong>Drop a CSV here</strong> or click to choose a file.<br><span style="color:#606770; font-size: 13px;">Expected columns: type (+ sourcePath)</span></div></div>
  <div class="controls" style="margin-top: 16px;"><button id="run" disabled>Generate chart</button></div>
  <div class="status" id="status"></div>
</div>

<div class="card hidden" id="chart-card">
  <div class="chart-header"><h2 id="chart-title">LST Types</h2><button class="secondary" id="download">Download HTML</button></div>
  <div class="chart" id="chart"></div>
</div>

<script src="_shared/common.js"></script>
<script>
const PALETTE = ['#2E86AB','#A23B72','#F18F01','#C73E1D','#3B8686','#79BD8F','#A8DBA8','#CFF09E','#FF6B6B','#4ECDC4'];

let loadedRows = null;
const runBtn = document.getElementById('run'), statusEl = document.getElementById('status');
wireFileDrop({ dropId: 'drop', inputId: 'file', dropTextId: 'drop-text', onRows: (rows) => { loadedRows = rows.map(normalizeHeaders); runBtn.disabled = false; statusEl.textContent = `Ready. ${rows.length.toLocaleString()} rows parsed.`; } });

runBtn.addEventListener('click', () => {
  if (!loadedRows) return;
  const rows = loadedRows.filter(r => r.type);
  if (rows.length === 0) { statusEl.innerHTML = '<span class="error">No rows with type.</span>'; document.getElementById('chart-card').classList.add('hidden'); return; }

  const counts = new Map();
  for (const r of rows) counts.set(r.type, (counts.get(r.type) || 0) + 1);
  const entries = [...counts.entries()].sort((a, b) => a[1] - b[1]);

  document.getElementById('chart-card').classList.remove('hidden');
  Plotly.newPlot('chart', [{
    type: 'bar', orientation: 'h',
    y: entries.map(e => e[0]), x: entries.map(e => e[1]),
    marker: { color: entries.map((_, i) => PALETTE[i % PALETTE.length]) },
    text: entries.map(e => e[1].toLocaleString()), textposition: 'auto',
    hovertemplate: '<b>%{y}</b><br>Count: %{x}<extra></extra>'
  }], {
    title: { text: `Source files by LST type (${rows.length.toLocaleString()} total)`, font: { size: 18 } },
    xaxis: { title: 'File count' }, yaxis: { automargin: true },
    height: Math.max(400, entries.length * 28 + 150),
    margin: { l: 240, r: 20, t: 60, b: 60 }
  }, { responsive: true });

  statusEl.textContent = `Rendered ${entries.length} LST types.`;
});

document.getElementById('download').addEventListener('click', () => downloadStandaloneChart('chart', 'find_source_files.html'));
</script>
</body>
</html>

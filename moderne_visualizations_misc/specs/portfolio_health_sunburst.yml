---
type: specs.moderne.io/v1beta/visualization
name: io.moderne.PortfolioHealthSunburst
displayName: Portfolio code health overview
description: >
  Hierarchical sunburst showing code health across the portfolio.
  Drill from repository to package to class. Color represents maintainability
  (green = healthy, red = needs attention). Size represents code volume.
recipe: io.moderne.prethink.quality.FindClassMetrics
dataTable: io.moderne.prethink.table.ClassQualityMetrics
options:
  - repository_filter:
      displayName: Repository filter
      description: >
        Only include data where the repository contains one of the following terms (case insensitive).
        Branch names are appended to the repository name with a `/` separator.
      required: false
  - health_metric:
      displayName: Health metric
      description: >
        Which metric to use for color encoding. Options: maintainabilityIndex (default),
        wmc (weighted methods per class), lcom4 (lack of cohesion).
      required: false

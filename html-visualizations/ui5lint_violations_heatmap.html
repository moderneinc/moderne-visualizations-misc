<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UI5Lint Violations Heatmap</title>
<link rel="stylesheet" href="_shared/styles.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<header>
  <h1>UI5Lint violations heatmap</h1>
  <p class="sub">Drop a UI5Lint CSV to render a heatmap of repository &times; ruleId counts.</p>
  <p class="sub"><a href="index.html">&larr; Back to index</a></p>
</header>

<div class="card">
  <div class="file-drop" id="drop"><input type="file" id="file" accept=".csv" /><div id="drop-text"><strong>Drop a CSV here</strong> or click to choose a file.<br><span style="color:#606770; font-size: 13px;">Expected columns: ruleId, repositoryPath, repositoryBranch</span></div></div>
  <div class="controls" style="margin-top: 16px;"><button id="run" disabled>Generate chart</button></div>
  <div class="status" id="status"></div>
</div>

<div class="card hidden" id="chart-card">
  <div class="chart-header"><h2 id="chart-title">UI5Lint Violations Heatmap</h2><button class="secondary" id="download">Download HTML</button></div>
  <div class="chart" id="chart"></div>
</div>

<script src="_shared/common.js"></script>
<script>
let loadedRows = null;
const runBtn = document.getElementById('run'), statusEl = document.getElementById('status');
wireFileDrop({ dropId: 'drop', inputId: 'file', dropTextId: 'drop-text', onRows: (rows) => { loadedRows = rows; runBtn.disabled = false; statusEl.textContent = `Ready. ${rows.length.toLocaleString()} rows parsed.`; } });

runBtn.addEventListener('click', () => {
  if (!loadedRows) return;
  const rows = loadedRows.filter(r => r.ruleId);
  if (rows.length === 0) { statusEl.innerHTML = '<span class="error">No rows with ruleId.</span>'; document.getElementById('chart-card').classList.add('hidden'); return; }

  const agg = new Map();
  for (const r of rows) {
    const repo = `${r.repositoryPath}:${r.repositoryBranch}`;
    const k = `${repo}\u0001${r.ruleId}`;
    agg.set(k, (agg.get(k) || 0) + 1);
  }

  const repos = [...new Set([...agg.keys()].map(k => k.split('\u0001')[0]))].sort();
  const rules = [...new Set([...agg.keys()].map(k => k.split('\u0001')[1]))].sort();
  const z = repos.map(r => rules.map(ru => agg.get(`${r}\u0001${ru}`) || 0));

  document.getElementById('chart-card').classList.remove('hidden');
  Plotly.newPlot('chart', [{
    type: 'heatmap',
    z, x: rules, y: repos,
    text: z.map(row => row.map(v => v > 0 ? String(v) : '')),
    texttemplate: '%{text}',
    colorscale: [[0.0, '#FFF5D9'], [0.3, '#FFD966'], [0.5, '#FFB04C'], [0.7, '#FF7043'], [1.0, '#C62828']],
    hovertemplate: 'Rule id: %{x}<br>Repository: %{y}<br>Count: %{z}<extra></extra>'
  }], {
    title: { text: `Heatmap of rule violations by repository (${rows.length.toLocaleString()} total)`, font: { size: 18 } },
    xaxis: { title: 'Rule ID', tickangle: -45, automargin: true },
    yaxis: { title: 'Repository', automargin: true, autorange: 'reversed' },
    height: Math.max(500, repos.length * 26 + 200),
    margin: { l: 260, r: 50, t: 80, b: 180 }
  }, { responsive: true });

  statusEl.textContent = `Rendered ${repos.length} repos × ${rules.length} rules.`;
});

document.getElementById('download').addEventListener('click', () => downloadStandaloneChart('chart', 'ui5lint_violations_heatmap.html'));
</script>
</body>
</html>

---
type: specs.moderne.io/v1beta/visualization
name: io.moderne.ComplexityVsTestGapsBubble
displayName: Complexity vs test coverage risk
description: >
  Bubble chart joining class complexity with test gaps. X-axis shows weighted methods
  per class (WMC), Y-axis shows untested method count, and bubble size represents
  a composite risk score. Classes in the upper-right are high-complexity with poor
  test coverage, representing the highest risk.
recipe: io.moderne.prethink.UpdatePrethinkContextNoAiStarter
dataTable: io.moderne.prethink.table.ClassQualityMetrics
additionalDataTables:
  data_file_gaps: io.moderne.prethink.table.TestGaps
options:
  - repository_filter:
      displayName: Repository filter
      description: >
        Only include data where the repository contains one of the following terms (case insensitive).
        Branch names are appended to the repository name with a `/` separator.
      required: false
  - min_wmc:
      displayName: Minimum WMC threshold
      description: >
        Only include classes with a weighted methods per class (WMC) value at or above
        this threshold. Filters out simple classes to focus on complex ones.
        Default is 5.
      required: false

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recipe Performance</title>
<link rel="stylesheet" href="_shared/styles.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<header>
  <h1>Recipe performance</h1>
  <p class="sub">Drop a RecipePerformance CSV to see top-N recipes by total scan or edit time (nanoseconds converted to seconds).</p>
  <p class="sub"><a href="index.html">&larr; Back to index</a></p>
</header>

<div class="card">
  <div class="file-drop" id="drop"><input type="file" id="file" accept=".csv" /><div id="drop-text"><strong>Drop a CSV here</strong> or click to choose a file.<br><span style="color:#606770; font-size: 13px;">Expected columns: recipe + scanTotalTime(Ns) + editTotalTime(Ns)</span></div></div>
  <div class="controls" style="margin-top: 16px;">
    <div class="field"><label for="sort-by">Sort by</label><select id="sort-by"><option value="edit">Edit total time</option><option value="scan">Scan total time</option></select></div>
    <div class="field"><label for="top-n">Top N</label><input type="number" id="top-n" value="10" min="1" max="100" /></div>
    <button id="run" disabled>Generate chart</button>
  </div>
  <div class="status" id="status"></div>
</div>

<div class="card hidden" id="chart-card">
  <div class="chart-header"><h2 id="chart-title">Recipe Performance</h2><button class="secondary" id="download">Download HTML</button></div>
  <div class="chart" id="chart"></div>
</div>

<script src="_shared/common.js"></script>
<script>
let loadedRows = null;
const runBtn = document.getElementById('run'), statusEl = document.getElementById('status');
wireFileDrop({ dropId: 'drop', inputId: 'file', dropTextId: 'drop-text', onRows: (rows) => { loadedRows = rows; runBtn.disabled = false; statusEl.textContent = `Ready. ${rows.length.toLocaleString()} rows parsed.`; } });

runBtn.addEventListener('click', () => {
  if (!loadedRows) return;
  const sortBy = document.getElementById('sort-by').value;
  const topN = Math.max(1, parseInt(document.getElementById('top-n').value, 10) || 10);

  // Column names may be scanTotalTime OR scanTotalTimeNs
  const scanCol = loadedRows[0] && (loadedRows[0].scanTotalTimeNs !== undefined ? 'scanTotalTimeNs' : 'scanTotalTime');
  const editCol = loadedRows[0] && (loadedRows[0].editTotalTimeNs !== undefined ? 'editTotalTimeNs' : 'editTotalTime');

  const agg = new Map();
  for (const r of loadedRows) {
    if (!r.recipe) continue;
    const cur = agg.get(r.recipe) || { scan: 0, edit: 0 };
    cur.scan += parseNum(r[scanCol]); cur.edit += parseNum(r[editCol]);
    agg.set(r.recipe, cur);
  }
  const entries = [...agg.entries()].map(([recipe, v]) => ({
    recipe, scanSec: v.scan / 1e9, editSec: v.edit / 1e9
  })).sort((a, b) => (sortBy === 'scan' ? b.scanSec - a.scanSec : b.editSec - a.editSec)).slice(0, topN);
  entries.reverse(); // highest at top when plotted horizontally

  if (entries.length === 0) { statusEl.innerHTML = '<span class="error">No recipes to plot.</span>'; document.getElementById('chart-card').classList.add('hidden'); return; }

  const key = sortBy === 'scan' ? 'scanSec' : 'editSec';
  document.getElementById('chart-card').classList.remove('hidden');
  Plotly.newPlot('chart', [{
    type: 'bar', orientation: 'h',
    y: entries.map(e => e.recipe), x: entries.map(e => e[key]),
    marker: {
      color: entries.map(e => e[key]),
      colorscale: [[0, '#1B263B'], [0.5, '#2E86AB'], [1, '#52BBA0']],
      colorbar: { title: { text: `${sortBy} time (s)` }, thickness: 12 }
    },
    text: entries.map(e => e[key].toFixed(2)), textposition: 'auto',
    hovertemplate: `<b>%{y}</b><br>Total ${sortBy} time: %{x:.2f}s<extra></extra>`
  }], {
    title: { text: `Total ${sortBy} time for top ${entries.length} recipes`, font: { size: 18 } },
    xaxis: { title: `Total ${sortBy} time (s)` }, yaxis: { automargin: true },
    height: Math.max(300, entries.length * 25 + 150),
    margin: { l: 320, r: 80, t: 60, b: 60 }
  }, { responsive: true });

  statusEl.textContent = `Rendered top ${entries.length} recipes of ${agg.size} total.`;
});

document.getElementById('download').addEventListener('click', () => downloadStandaloneChart('chart', 'recipe_performance.html'));
</script>
</body>
</html>

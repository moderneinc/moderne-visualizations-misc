<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test Quality Language Sunburst</title>
<link rel="stylesheet" href="_shared/styles.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<header>
  <h1>Test quality language sunburst</h1>
  <p class="sub">Drop a TestQualityIssues CSV to see a language &rarr; severity &rarr; issue-type sunburst.</p>
  <p class="sub"><a href="index.html">&larr; Back to index</a></p>
</header>

<div class="card">
  <div class="file-drop" id="drop"><input type="file" id="file" accept=".csv" /><div id="drop-text"><strong>Drop a CSV here</strong> or click to choose a file.<br><span style="color:#606770; font-size: 13px;">Expected columns: repositoryPath, language, severity, issueType</span></div></div>
  <div class="controls" style="margin-top: 16px;">
    <div class="field"><label for="repo-filter">Repository filter</label><input type="text" id="repo-filter" placeholder="comma-separated" /></div>
    <button id="run" disabled>Generate chart</button>
  </div>
  <div class="status" id="status"></div>
</div>

<div class="card hidden" id="chart-card">
  <div class="chart-header"><h2 id="chart-title">Test Quality Issues — Language → Severity → Type</h2><button class="secondary" id="download">Download HTML</button></div>
  <div class="chart" id="chart"></div>
</div>

<script src="_shared/common.js"></script>
<script>
const LANG_COLORS = { java: '#2196F3', javascript: '#FDD835', python: '#4CAF50', typescript: '#3178C6', kotlin: '#A97BFF' };

let loadedRows = null;
const runBtn = document.getElementById('run'), statusEl = document.getElementById('status');
wireFileDrop({ dropId: 'drop', inputId: 'file', dropTextId: 'drop-text', onRows: (rows) => { loadedRows = rows.map(normalizeHeaders); runBtn.disabled = false; statusEl.textContent = `Ready. ${rows.length.toLocaleString()} rows parsed.`; } });

runBtn.addEventListener('click', () => {
  if (!loadedRows) return;
  const filterStr = document.getElementById('repo-filter').value;
  const rows = loadedRows.filter(r => matchesRepoFilter(r.repositoryPath, filterStr)).filter(r => r.language && r.severity && r.issueType);
  if (rows.length === 0) { statusEl.innerHTML = '<span class="error">No rows after filter.</span>'; document.getElementById('chart-card').classList.add('hidden'); return; }

  const nodes = new Map();
  const colorOf = (lang) => LANG_COLORS[lang] || '#999';
  const upsert = (id, label, parent, color) => {
    const n = nodes.get(id) || { id, label, parent, value: 0, color };
    n.value += 1; nodes.set(id, n);
  };
  for (const r of rows) {
    const color = colorOf(r.language);
    const langId = r.language, sevId = `${langId}\u0001${r.severity}`, issueId = `${sevId}\u0001${r.issueType}`;
    upsert(langId, r.language, '', color);
    upsert(sevId, r.severity, langId, color);
    upsert(issueId, r.issueType, sevId, color);
  }
  const list = [...nodes.values()];

  document.getElementById('chart-card').classList.remove('hidden');
  Plotly.newPlot('chart', [{
    type: 'sunburst',
    ids: list.map(n => n.id), labels: list.map(n => n.label), parents: list.map(n => n.parent), values: list.map(n => n.value),
    marker: { colors: list.map(n => n.color) },
    branchvalues: 'total',
    hovertemplate: '<b>%{label}</b><br>Count: %{value}<extra></extra>'
  }], {
    title: { text: 'Test Quality Issues — Language → Severity → Type', font: { size: 18 } },
    height: 700, margin: { l: 20, r: 20, t: 60, b: 40 }
  }, { responsive: true });

  statusEl.textContent = `Rendered ${rows.length.toLocaleString()} issues.`;
});

document.getElementById('download').addEventListener('click', () => downloadStandaloneChart('chart', 'test_quality_language_sunburst.html'));
</script>
</body>
</html>

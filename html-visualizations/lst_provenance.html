<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LST Provenance</title>
<link rel="stylesheet" href="_shared/styles.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<header>
  <h1>LST provenance</h1>
  <p class="sub">Drop an LST-provenance CSV to see build tool / version distribution across repositories.</p>
  <p class="sub"><a href="index.html">&larr; Back to index</a></p>
</header>

<div class="card">
  <div class="file-drop" id="drop">
    <input type="file" id="file" accept=".csv" />
    <div id="drop-text">
      <strong>Drop a CSV here</strong> or click to choose a file.<br>
      <span style="color:#606770; font-size: 13px;">Expected columns: buildToolType, buildToolVersion</span>
    </div>
  </div>
  <div class="controls" style="margin-top: 16px;">
    <button id="run" disabled>Generate chart</button>
  </div>
  <div class="status" id="status"></div>
</div>

<div class="card hidden" id="chart-card">
  <div class="chart-header">
    <h2 id="chart-title">Build tool versions across repositories</h2>
    <button class="secondary" id="download">Download HTML</button>
  </div>
  <div class="chart" id="chart"></div>
</div>

<script src="_shared/common.js"></script>
<script>
const COLORS = ['#2E86AB', '#A23B72', '#F18F01', '#C73E1D', '#3B8686', '#79BD8F', '#A8DBA8'];

let loadedRows = null;
const runBtn = document.getElementById('run');
const statusEl = document.getElementById('status');

wireFileDrop({
  dropId: 'drop', inputId: 'file', dropTextId: 'drop-text',
  onRows: (rows) => {
    loadedRows = rows;
    runBtn.disabled = false;
    statusEl.textContent = `Ready. ${rows.length.toLocaleString()} rows parsed.`;
  }
});

runBtn.addEventListener('click', () => {
  if (!loadedRows) return;
  const rows = loadedRows.filter(r => r.buildToolType && r.buildToolVersion);
  if (rows.length === 0) {
    statusEl.innerHTML = '<span class="error">No rows with buildToolType + buildToolVersion found.</span>';
    document.getElementById('chart-card').classList.add('hidden');
    return;
  }

  // Count (buildToolVersion, buildToolType) occurrences
  const counts = new Map();
  const types = new Set();
  const versions = new Set();
  for (const r of rows) {
    const type = r.buildToolType;
    const version = r.buildToolVersion;
    types.add(type); versions.add(version);
    const k = `${version}\u0001${type}`;
    counts.set(k, (counts.get(k) || 0) + 1);
  }

  const sortedVersions = [...versions].sort(compareVersions);
  const sortedTypes = [...types].sort();

  const traces = sortedTypes.map((type, i) => ({
    type: 'bar',
    name: type,
    x: sortedVersions,
    y: sortedVersions.map(v => counts.get(`${v}\u0001${type}`) || 0),
    marker: { color: COLORS[i % COLORS.length] },
    hovertemplate: `<b>${type}</b><br>Version: %{x}<br>Count: %{y}<extra></extra>`
  }));

  const title = 'Build tool versions across repositories';
  document.getElementById('chart-title').textContent = title;
  document.getElementById('chart-card').classList.remove('hidden');

  Plotly.newPlot('chart', traces, {
    title: { text: title, font: { size: 18 } },
    barmode: 'stack',
    xaxis: { title: 'Build tool version', type: 'category', categoryorder: 'array', categoryarray: sortedVersions, tickangle: -45 },
    yaxis: { title: 'Number of repositories' },
    legend: { title: { text: 'Build tool' } },
    height: 600,
    margin: { l: 60, r: 30, t: 60, b: 120 }
  }, { responsive: true });

  statusEl.textContent = `Rendered ${rows.length.toLocaleString()} repositories across ${sortedTypes.length} build tools and ${sortedVersions.length} distinct versions.`;
});

document.getElementById('download').addEventListener('click', () => {
  downloadStandaloneChart('chart', 'lst_provenance.html');
});
</script>
</body>
</html>

---
type: specs.moderne.io/v1beta/visualization
name: io.moderne.TestQualityIssueHeatmap
displayName: Test quality issues by repository and type
description: >
  Heatmap showing test quality issue counts per repository, bucketed by issue type.
  Color intensity reflects the count in each bucket. Quickly identifies which
  repositories carry the most test quality issues by category.
recipe: io.moderne.prethink.UpdatePrethinkContextNoAiStarter
dataTable: io.moderne.prethink.table.TestQualityIssues
options:
  - repository_filter:
      displayName: Repository filter
      description: >
        Only include data where the repository contains one of the following terms (case insensitive).
        Branch names are appended to the repository name with a `/` separator.
      required: false
  - top_n_repos:
      displayName: Number of repositories to display
      description: >
        The maximum number of repositories to display. Repositories are ranked
        by total number of test quality issues. Default is 20.
      required: false

---
type: specs.moderne.io/v1beta/visualization
name: io.moderne.ArchitecturalStabilityScatter
displayName: Package stability vs abstractness
description: >
  Martin's Main Sequence diagram plotting packages by instability and abstractness.
  Shows Zone of Pain (high stability, low abstractness) and Zone of Uselessness
  (low stability, high abstractness). Helps identify packages that violate the
  Stable Abstractions Principle.
recipe: io.moderne.prethink.quality.FindPackageMetrics
dataTable: io.moderne.prethink.table.PackageQualityMetrics
options:
  - repository_filter:
      displayName: Repository filter
      description: >
        Only include data where the repository contains one of the following terms (case insensitive).
        Branch names are appended to the repository name with a `/` separator.
      required: false
  - highlight_cycles:
      displayName: Highlight dependency cycles
      description: >
        Whether to visually highlight packages involved in dependency cycles.
        Default is true.
      required: false

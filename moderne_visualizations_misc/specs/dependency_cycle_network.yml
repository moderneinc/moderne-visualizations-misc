---
type: specs.moderne.io/v1beta/visualization
name: io.moderne.DependencyCycleNetwork
displayName: Package dependency cycle graph
description: >
  Interactive network graph showing packages involved in dependency cycles.
  Nodes represent packages and edges represent dependencies forming cycles.
  Hover over a node to highlight all packages in the same cycle. Useful for
  identifying and breaking circular dependencies.
recipe: io.moderne.prethink.UpdatePrethinkContextNoAi
dataTable: io.moderne.prethink.table.PackageQualityMetrics
options:
  - repository_filter:
      displayName: Repository filter
      description: >
        Only include data where the repository contains one of the following terms (case insensitive).
        Branch names are appended to the repository name with a `/` separator.
      required: false
  - show_context_packages:
      displayName: Show context packages
      description: >
        Whether to show non-cyclic packages that are directly connected to cycle members,
        providing context for understanding the cycle structure.
        Default is true.
      required: false

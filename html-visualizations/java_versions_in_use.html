<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Java Versions in Use</title>
<link rel="stylesheet" href="_shared/styles.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<header>
  <h1>Java versions in use</h1>
  <p class="sub">Drop a JavaVersionsInUse CSV to see a bar chart of how many repositories target each source/target Java version pair.</p>
  <p class="sub"><a href="index.html">&larr; Back to index</a></p>
</header>

<div class="card">
  <div class="file-drop" id="drop"><input type="file" id="file" accept=".csv" /><div id="drop-text"><strong>Drop a CSV here</strong> or click to choose a file.<br><span style="color:#606770; font-size: 13px;">Expected columns: sourceVersion (targetVersion optional)</span></div></div>
  <div class="controls" style="margin-top: 16px;"><button id="run" disabled>Generate chart</button></div>
  <div class="status" id="status"></div>
</div>

<div class="card hidden" id="chart-card">
  <div class="chart-header"><h2 id="chart-title">Java Versions in Use</h2><button class="secondary" id="download">Download HTML</button></div>
  <div class="chart" id="chart"></div>
</div>

<script src="_shared/common.js"></script>
<script>
let loadedRows = null;
const runBtn = document.getElementById('run'), statusEl = document.getElementById('status');
wireFileDrop({ dropId: 'drop', inputId: 'file', dropTextId: 'drop-text', onRows: (rows) => { loadedRows = rows; runBtn.disabled = false; statusEl.textContent = `Ready. ${rows.length.toLocaleString()} rows parsed.`; } });

runBtn.addEventListener('click', () => {
  if (!loadedRows) return;
  const rows = loadedRows.filter(r => r.sourceVersion);
  if (rows.length === 0) { statusEl.innerHTML = '<span class="error">No rows with sourceVersion.</span>'; document.getElementById('chart-card').classList.add('hidden'); return; }

  // Group by (sourceVersion, targetVersion)
  const agg = new Map();
  for (const r of rows) {
    const sv = String(r.sourceVersion); const tv = String(r.targetVersion || sv);
    const k = `${sv}\u0001${tv}`; agg.set(k, (agg.get(k) || 0) + 1);
  }
  const sourceVersions = [...new Set(rows.map(r => String(r.sourceVersion)))].sort(compareVersions);
  const targetVersions = [...new Set(rows.map(r => String(r.targetVersion || r.sourceVersion)))].sort(compareVersions);

  const traces = targetVersions.map(tv => ({
    type: 'bar', name: `Target ${tv}`,
    x: sourceVersions, y: sourceVersions.map(sv => agg.get(`${sv}\u0001${tv}`) || 0),
    hovertemplate: `<b>Source: %{x}</b><br>Target: ${tv}<br>Count: %{y}<extra></extra>`
  }));

  document.getElementById('chart-card').classList.remove('hidden');
  Plotly.newPlot('chart', traces, {
    title: { text: `Java versions in use (${rows.length.toLocaleString()} repos)`, font: { size: 18 } },
    xaxis: { title: 'Source version', type: 'category', categoryorder: 'array', categoryarray: sourceVersions },
    yaxis: { title: 'Repository count' },
    barmode: 'stack', height: 600
  }, { responsive: true });

  statusEl.textContent = `Rendered ${sourceVersions.length} source × ${targetVersions.length} target combinations.`;
});

document.getElementById('download').addEventListener('click', () => downloadStandaloneChart('chart', 'java_versions_in_use.html'));
</script>
</body>
</html>

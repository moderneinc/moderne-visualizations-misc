<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test Quality by Language</title>
<link rel="stylesheet" href="_shared/styles.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<header>
  <h1>Test quality issues by language</h1>
  <p class="sub">Drop a TestQualityIssues CSV to see a grouped bar of issue types split by language.</p>
  <p class="sub"><a href="index.html">&larr; Back to index</a></p>
</header>

<div class="card">
  <div class="file-drop" id="drop"><input type="file" id="file" accept=".csv" /><div id="drop-text"><strong>Drop a CSV here</strong> or click to choose a file.<br><span style="color:#606770; font-size: 13px;">Expected columns: repositoryPath, issueType, language</span></div></div>
  <div class="controls" style="margin-top: 16px;">
    <div class="field"><label for="repo-filter">Repository filter</label><input type="text" id="repo-filter" placeholder="comma-separated" /></div>
    <button id="run" disabled>Generate chart</button>
  </div>
  <div class="status" id="status"></div>
</div>

<div class="card hidden" id="chart-card">
  <div class="chart-header"><h2 id="chart-title">Test Quality Issues by Language</h2><button class="secondary" id="download">Download HTML</button></div>
  <div class="chart" id="chart"></div>
</div>

<script src="_shared/common.js"></script>
<script>
const LANG_COLORS = { java: '#2196F3', javascript: '#FDD835', python: '#4CAF50', typescript: '#3178C6', kotlin: '#A97BFF', go: '#00ADD8' };

let loadedRows = null;
const runBtn = document.getElementById('run'), statusEl = document.getElementById('status');
wireFileDrop({ dropId: 'drop', inputId: 'file', dropTextId: 'drop-text', onRows: (rows) => { loadedRows = rows; runBtn.disabled = false; statusEl.textContent = `Ready. ${rows.length.toLocaleString()} rows parsed.`; } });

runBtn.addEventListener('click', () => {
  if (!loadedRows) return;
  const filterStr = document.getElementById('repo-filter').value;
  const rows = loadedRows.filter(r => matchesRepoFilter(r.repositoryPath, filterStr)).filter(r => r.issueType && r.language);
  if (rows.length === 0) { statusEl.innerHTML = '<span class="error">No rows after filter.</span>'; document.getElementById('chart-card').classList.add('hidden'); return; }

  const issueTotals = new Map();
  for (const r of rows) issueTotals.set(r.issueType, (issueTotals.get(r.issueType) || 0) + 1);
  const issueOrder = [...issueTotals.entries()].sort((a, b) => b[1] - a[1]).map(e => e[0]);

  const langs = [...new Set(rows.map(r => r.language))].sort();
  const counts = {};
  for (const lang of langs) counts[lang] = Object.fromEntries(issueOrder.map(i => [i, 0]));
  for (const r of rows) if (counts[r.language]) counts[r.language][r.issueType] += 1;

  const traces = langs.map(lang => ({
    type: 'bar', name: lang, x: issueOrder, y: issueOrder.map(i => counts[lang][i] || 0),
    marker: { color: LANG_COLORS[lang] || '#999' },
    hovertemplate: `<b>%{x}</b><br>Language: ${lang}<br>Count: %{y}<extra></extra>`
  }));

  document.getElementById('chart-card').classList.remove('hidden');
  Plotly.newPlot('chart', traces, {
    title: { text: 'Test Quality Issues by Language', font: { size: 18 } },
    xaxis: { title: 'Issue type', tickangle: -45, categoryorder: 'array', categoryarray: issueOrder },
    yaxis: { title: 'Count' },
    barmode: 'group', height: 500,
    margin: { l: 60, r: 50, t: 60, b: 140 }
  }, { responsive: true });

  statusEl.textContent = `Rendered ${rows.length.toLocaleString()} issues across ${langs.length} languages.`;
});

document.getElementById('download').addEventListener('click', () => downloadStandaloneChart('chart', 'test_quality_by_language.html'));
</script>
</body>
</html>

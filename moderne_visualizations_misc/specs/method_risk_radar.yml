---
type: specs.moderne.io/v1beta/visualization
name: io.moderne.MethodRiskRadar
displayName: Method risk radar profiles
description: >
  Radar chart overlaying the top riskiest methods across five quality dimensions.
  Each axis represents a normalized metric (cyclomatic complexity, cognitive complexity,
  line count, Halstead difficulty, parameter count). Methods with large, irregular
  shapes indicate multi-dimensional risk.
recipe: io.moderne.prethink.UpdatePrethinkContextNoAiStarter
dataTable: io.moderne.prethink.table.MethodQualityMetrics
options:
  - repository_filter:
      displayName: Repository filter
      description: >
        Only include data where the repository contains one of the following terms (case insensitive).
        Branch names are appended to the repository name with a `/` separator.
      required: false
  - top_n_methods:
      displayName: Number of methods to display
      description: >
        The maximum number of riskiest methods to overlay on the radar chart.
        Methods are ranked by composite risk score across all dimensions.
        Default is 8.
      required: false

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gradle Wrappers</title>
<link rel="stylesheet" href="_shared/styles.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<header>
  <h1>Gradle wrappers</h1>
  <p class="sub">Drop a GradleWrappers CSV to see a stacked bar of wrapper versions by distribution (all / bin).</p>
  <p class="sub"><a href="index.html">&larr; Back to index</a></p>
</header>

<div class="card">
  <div class="file-drop" id="drop"><input type="file" id="file" accept=".csv" /><div id="drop-text"><strong>Drop a CSV here</strong> or click to choose a file.<br><span style="color:#606770; font-size: 13px;">Expected columns: version, distribution</span></div></div>
  <div class="controls" style="margin-top: 16px;"><button id="run" disabled>Generate chart</button></div>
  <div class="status" id="status"></div>
</div>

<div class="card hidden" id="chart-card">
  <div class="chart-header"><h2 id="chart-title">Gradle Wrappers</h2><button class="secondary" id="download">Download HTML</button></div>
  <div class="chart" id="chart"></div>
</div>

<script src="_shared/common.js"></script>
<script>
let loadedRows = null;
const runBtn = document.getElementById('run'), statusEl = document.getElementById('status');
wireFileDrop({ dropId: 'drop', inputId: 'file', dropTextId: 'drop-text', onRows: (rows) => { loadedRows = rows.map(normalizeHeaders); runBtn.disabled = false; statusEl.textContent = `Ready. ${rows.length.toLocaleString()} rows parsed.`; } });

runBtn.addEventListener('click', () => {
  if (!loadedRows) return;
  const rows = loadedRows.filter(r => r.version !== undefined && r.version !== '');
  if (rows.length === 0) { statusEl.innerHTML = '<span class="error">No rows with version.</span>'; document.getElementById('chart-card').classList.add('hidden'); return; }

  const agg = new Map();
  for (const r of rows) {
    const v = String(r.version), d = String(r.distribution || '(unknown)');
    const k = `${v}\u0001${d}`; agg.set(k, (agg.get(k) || 0) + 1);
  }
  const versions = [...new Set(rows.map(r => String(r.version)))].sort(compareVersions);
  const dists = [...new Set(rows.map(r => String(r.distribution || '(unknown)')))].sort();

  const traces = dists.map(d => ({
    type: 'bar', name: d,
    x: versions, y: versions.map(v => agg.get(`${v}\u0001${d}`) || 0),
    hovertemplate: `<b>Gradle %{x}</b><br>Distribution: ${d}<br>Count: %{y}<extra></extra>`
  }));

  document.getElementById('chart-card').classList.remove('hidden');
  Plotly.newPlot('chart', traces, {
    title: { text: `Gradle wrapper versions (${rows.length.toLocaleString()} repos)`, font: { size: 18 } },
    xaxis: { title: 'Gradle version', type: 'category', tickangle: -45 },
    yaxis: { title: 'Repository count' },
    barmode: 'stack', height: 600, margin: { l: 60, r: 30, t: 60, b: 120 }
  }, { responsive: true });

  statusEl.textContent = `Rendered ${versions.length} versions × ${dists.length} distributions.`;
});

document.getElementById('download').addEventListener('click', () => downloadStandaloneChart('chart', 'gradle_wrappers.html'));
</script>
</body>
</html>

---
type: specs.moderne.io/v1beta/visualization
name: io.moderne.TestQualityRiskMatrix
displayName: Test quality risk matrix
description: >
  Bubble chart showing the distribution of test quality issues by issue type
  and severity. Bubble size reflects the count of issues in each combination.
  Quickly identifies which issue types are most prevalent at each severity level.
recipe: io.moderne.prethink.UpdatePrethinkContextNoAiStarter
dataTable: io.moderne.prethink.table.TestQualityIssues
options:
  - repository_filter:
      displayName: Repository filter
      description: >
        Only include data where the repository contains one of the following terms (case insensitive).
        Branch names are appended to the repository name with a `/` separator.
      required: false
